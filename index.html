.nav-links a:hover { color: var(--text-primary); }
.nav-cta {

}
.nav-cta:hover { transform: translateY(-1px); box-shadow: 0 4px 16px var(--red-glow); }

/* MAIN VIEWS */
#list-view, #detail-view { display: none; }

/* GAMES SECTION */
.games-section { padding: calc(64px + 2rem) clamp(1.5rem,4vw,3rem) 3rem; background: var(--bg-surface); min-height: 100vh; }
.section-header { text-align: center; margin-bottom: 2rem; }
.section-label { font-size: 0.7rem; color: var(--red); text-transform: uppercase; letter-spacing: 3px; font-weight: 600; margin-bottom: 0.5rem; }
.section-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(1.8rem,3.5vw,2.5rem); letter-spacing: 1px; }

/* FILTERS */
.filters-bar { max-width: 1300px; margin: 0 auto 2rem; display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; justify-content: space-between; }
.search-box { position: relative; flex: 1; min-width: 200px; max-width: 340px; }
.search-box input {

  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-box input::placeholder { color: var(--text-dim); }
.search-box input:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(255,26,26,0.1); }

.filter-tag:hover { border-color: var(--border-hover); color: var(--text-primary); background: var(--bg-card-hover); }
.filter-tag.active { background: var(--red); border-color: var(--red); color: white; box-shadow: 0 0 16px var(--red-glow); }

/* GAMES GRID */
.games-grid { max-width: 1300px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.25rem; }

/* GAME CARD */
.game-card {

  border-radius: 14px; overflow: hidden; cursor: pointer;
  transition: transform 0.3s cubic-bezier(0.22,1,0.36,1), border-color 0.3s, box-shadow 0.3s;
  opacity: 0; transform: translateY(30px);
}
.game-card.visible { opacity: 1; transform: translateY(0); transition: opacity 0.5s ease-out, transform 0.5s ease-out, border-color 0.3s, box-shadow 0.3s; }
.game-card:hover { transform: translateY(-5px); border-color: var(--red); box-shadow: 0 16px 48px rgba(0,0,0,0.4), 0 0 30px var(--red-glow); }
.card-thumb-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; overflow: hidden; }

.card-live-badge {

  border: 1px solid rgba(34,197,94,0.25); border-radius: 5px;

  display: flex; align-items: center; gap: 0.35rem;

.card-body { padding: 0.85rem 1.1rem 1.1rem; }
.card-title { font-family: 'Chakra Petch', sans-serif; font-weight: 700; font-size: 1.05rem; margin-bottom: 0.3rem; line-height: 1.3; transition: color 0.2s; }

.card-desc { font-size: 0.78rem; color: var(--text-secondary); line-height: 1.5; margin-bottom: 0.8rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

// ═══════════════════════════════════
// HELPERS
// ═══════════════════════════════════
function formatNum(n) {
  if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return n.toLocaleString();
}

// ═══════════════════════════════════
// LIVE STATS
// ═══════════════════════════════════
async function fetchLiveStats() {
  const ids = games.map(g => g.universeId).join(',');
  try {
    const res = await fetch('https://games.roproxy.com/v1/games?universeIds=' + ids);
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    if (data && data.data) {
      data.data.forEach(d => {
        const g = games.find(g => g.universeId === d.id);
        if (g) {
          g.players = formatNum(d.playing);
          g.visits = formatNum(d.visits);
          g.favorites = formatNum(d.favoritedCount);
          g._livePlaying = d.playing;
          g._liveVisits = d.visits;
        }
      });
      // Re-sort by live playing count
      games.sort((a, b) => (b._livePlaying || 0) - (a._livePlaying || 0));
      // Update date
      document.getElementById('updated-date').textContent = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      // Re-render current view
      if (document.getElementById('list-view').classList.contains('active')) {
        applyFilters();
      }
    }
  } catch (e) {
    // Fallback: use static data
    document.getElementById('updated-date').textContent = 'Feb 28, 2026 (static)';
  }
}

const grid = document.getElementById('games-grid');

// ═══════════════════════════════════
// FILTERS
// ═══════════════════════════════════
const filterTags = document.querySelectorAll('.filter-tag');
const searchInput = document.getElementById('search-input');
let activeFilter = 'all';

function applyFilters() {
  const query = searchInput.value.toLowerCase().trim();
  const filtered = games.filter(g => {
    const matchesGenre = activeFilter === 'all' || g.genre === activeFilter;
    const matchesSearch = !query || g.name.toLowerCase().includes(query) || g.desc.toLowerCase().includes(query) || g.genre.toLowerCase().includes(query);
    return matchesGenre && matchesSearch;
  });
  renderCards(filtered);
}

filterTags.forEach(tag => {
  tag.addEventListener('click', () => {
    filterTags.forEach(t => t.classList.remove('active'));
    tag.classList.add('active');
    activeFilter = tag.dataset.filter;
    applyFilters();
  });
});
searchInput.addEventListener('input', applyFilters);

        <div class="lbl">Favorites</div>
      </div>
      <div class="detail-stat-card">
        <div class="val">${g.maxPlayers}</div>
        <div class="lbl">Max Players</div>
      </div>
    </div>

    <a href="${g.url}" target="_blank" rel="noopener" class="detail-play-btn">
      <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Play on Roblox
    </a>

    <div class="detail-desc">
      <h3>About This Game</h3>
      <p>${g.longDesc}</p>
    </div>

    <div class="detail-screenshots">
      <h3>Screenshots</h3>
      <div class="screenshots-grid">
        ${g.screenshots.map(s => `<img src="${s}" alt="${g.name} screenshot" loading="lazy" onclick="openLightbox('${s}'); event.stopPropagation();">`).join('')}
      </div>
    </div>
  `;
}

function showList() {
  window.location.hash = '';
  document.getElementById('detail-view').classList.remove('active');
  document.getElementById('list-view').classList.add('active');
  document.title = 'Mertlox — The Most Popular Games on Roblox';
}

// ═══════════════════════════════════
// LIGHTBOX
// ═══════════════════════════════════
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// ═══════════════════════════════════
// HASH ROUTING
// ═══════════════════════════════════
function handleRoute() {
  const hash = window.location.hash;
  if (hash.startsWith('#game/')) {
    const slug = hash.replace('#game/', '');
    showDetail(slug);
  } else {
    document.getElementById('detail-view').classList.remove('active');
    document.getElementById('list-view').classList.add('active');
  }
}

window.addEventListener('hashchange', handleRoute);

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
document.getElementById('updated-date').textContent = 'loading live data...';
renderCards(games);
fetchLiveStats();
// Refresh live stats once per day
setInterval(fetchLiveStats, 24 * 60 * 60 * 1000);
handleRoute();
</script>

</body>
</html>
