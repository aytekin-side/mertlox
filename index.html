// HELPERS
// ═══════════════════════════════════
function formatNum(n) {
  if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return n.toLocaleString();
}

// ═══════════════════════════════════
// LIVE STATS
// ═══════════════════════════════════
async function fetchLiveStats() {
  const ids = games.map(g => g.universeId).join(',');
  try {
    const res = await fetch('https://games.roproxy.com/v1/games?universeIds=' + ids);
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    if (data && data.data) {
      data.data.forEach(d => {
        const g = games.find(g => g.universeId === d.id);
        if (g) {
          g.players = formatNum(d.playing);
          g.visits = formatNum(d.visits);
          g.favorites = formatNum(d.favoritedCount);
          g._livePlaying = d.playing;
          g._liveVisits = d.visits;
        }
      });
      // Re-sort by live playing count
      games.sort((a, b) => (b._livePlaying || 0) - (a._livePlaying || 0));
      // Update date
      document.getElementById('updated-date').textContent = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      // Re-render current view
      if (document.getElementById('list-view').classList.contains('active')) {
        applyFilters();
      }
    }
  } catch (e) {
    // Fallback: use static data
    document.getElementById('updated-date').textContent = 'Feb 28, 2026 (static)';
  }
}

// ═══════════════════════════════════
// FILTERS
// ═══════════════════════════════════
const filterTags = document.querySelectorAll('.filter-tag');
const searchInput = document.getElementById('search-input');
let activeFilter = 'all';

function applyFilters() {
  const query = searchInput.value.toLowerCase().trim();
  const filtered = games.filter(g => {
    const matchesGenre = activeFilter === 'all' || g.genre === activeFilter;
    const matchesSearch = !query || g.name.toLowerCase().includes(query) || g.desc.toLowerCase().includes(query) || g.genre.toLowerCase().includes(query);
    return matchesGenre && matchesSearch;
  });
  renderCards(filtered);
}

filterTags.forEach(tag => {
  tag.addEventListener('click', () => {
    filterTags.forEach(t => t.classList.remove('active'));
    tag.classList.add('active');
    activeFilter = tag.dataset.filter;
    applyFilters();
  });
});
searchInput.addEventListener('input', applyFilters);

  window.location.hash = '';
  document.getElementById('detail-view').classList.remove('active');
  document.getElementById('list-view').classList.add('active');
  document.title = 'Mertlox — The Most Popular Games on Roblox';
}

// ═══════════════════════════════════
// LIGHTBOX
// ═══════════════════════════════════
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// ═══════════════════════════════════
// VIDEO EMBED
// ═══════════════════════════════════
async function loadVideo(placeholder, query) {
  const container = placeholder.parentElement;
  placeholder.querySelector('.video-label').textContent = 'Loading video...';
  const searchQuery = encodeURIComponent(query);
  // Try Piped API (CORS-friendly YouTube proxy) to find a video
  const apis = ['https://pipedapi.kavin.rocks', 'https://pipedapi.adminforge.de'];
  for (const api of apis) {
    try {
      const res = await fetch(api + '/search?q=' + searchQuery + '&filter=videos');
      if (!res.ok) continue;
      const data = await res.json();
      const vid = data.items && data.items.find(i => i.type === 'stream' && i.url);
      if (vid) {
        const videoId = vid.url.replace('/watch?v=', '');
        container.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
        return;
      }
    } catch(e) { continue; }
  }
  // Fallback: link to YouTube search
  container.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:1rem;">
    <p style="color:var(--text-secondary);font-size:0.9rem;">Could not load video automatically</p>
    <a href="https://www.youtube.com/results?search_query=${searchQuery}" target="_blank" rel="noopener" style="background:var(--red);color:white;padding:0.6rem 1.2rem;border-radius:8px;text-decoration:none;font-weight:600;font-size:0.85rem;">Watch on YouTube →</a>
  </div>`;
}

// ═══════════════════════════════════
// HASH ROUTING
// ═══════════════════════════════════
function handleRoute() {
  const hash = window.location.hash;
  if (hash.startsWith('#game/')) {
    const slug = hash.replace('#game/', '');
    showDetail(slug);
  } else {
    document.getElementById('detail-view').classList.remove('active');
    document.getElementById('list-view').classList.add('active');
  }
}

window.addEventListener('hashchange', handleRoute);

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
document.getElementById('updated-date').textContent = 'loading live data...';
renderCards(games);
fetchLiveStats();
// Refresh live stats once per day
setInterval(fetchLiveStats, 24 * 60 * 60 * 1000);
handleRoute();
</script>
